{% extends 'shared/dashboard_layout.html' %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add New User{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="glass" style="padding:2rem;">
    <form method="POST" action="{{ url_for('admin.add_user') }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="full_name" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select name="role" class="form-select">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label class="form-label">Department</label><input type="text" name="department" class="form-control" placeholder="Optional"></div>
        <div class="form-group"><label class="form-label">Student/Employee ID</label><input type="text" name="student_id" class="form-control" placeholder="Optional"></div>
      </div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem;">
        <button type="submit" class="btn btn-primary"><i data-lucide="user-plus"></i> Create User</button>
        <a href="{{ url_for('admin.users') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
