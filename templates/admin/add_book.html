{% extends 'shared/dashboard_layout.html' %}
{% block title %}Add Book{% endblock %}
{% block page_title %}Add New Book{% endblock %}

{% block content %}
<div style="max-width:700px;">
  <div class="glass" style="padding:2rem;">
    <form method="POST" action="{{ request.url }}" enctype="multipart/form-data">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Author *</label><input type="text" name="author" class="form-control" required></div>
        <div class="form-group"><label class="form-label">ISBN</label><input type="text" name="isbn" class="form-control" placeholder="978-…"></div>
        <div class="form-group"><label class="form-label">Publisher</label><input type="text" name="publisher" class="form-control"></div>
        <div class="form-group"><label class="form-label">Published Year</label><input type="number" name="published_year" class="form-control" min="1000" max="2026"></div>
        <div class="form-group"><label class="form-label">Category</label>
          <select name="category_id" class="form-select">
            <option value="">— Select —</option>
            {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Language</label>
          <select name="language" class="form-select">
            <option>English</option><option>Hindi</option><option>Tamil</option><option>Telugu</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Total Copies</label><input type="number" name="copies_total" class="form-control" value="1" min="0"></div>
        <div class="form-group"><label class="form-label">Pages</label><input type="number" name="pages" class="form-control"></div>
        <div class="form-group"><label class="form-label">Shelf Location</label><input type="text" name="location" class="form-control" placeholder="e.g. A-3-Row 2"></div>
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">Cover Image Upload</label><input type="file" name="cover_image" class="form-control" accept="image/*"></div>
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">E-Book Upload (PDF/EPUB)</label><input type="file" name="pdf_file" class="form-control" accept="application/pdf,application/epub+zip"></div>
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">Tags (comma separated)</label><input type="text" name="tags" class="form-control" placeholder="python, programming, beginner"></div>
        <div class="form-group" style="grid-column:span 2;"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4"></textarea></div>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem;">
        <button type="submit" class="btn btn-primary"><i data-lucide="save"></i> Save Book</button>
        <a href="{{ url_for('admin.books') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
