{% extends 'shared/base.html' %}
{% block title %}Reading: {{ book.title }} — EduLib{% endblock %}
{% block body %}
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0f172a; color:#e2e8f0; font-family:'Inter',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.reader-topbar {
  height:56px; background:rgba(17,25,40,.95); border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; gap:1rem; padding:0 1.5rem;
  backdrop-filter:blur(12px); flex-shrink:0;
}
.reader-title { font-size:.9rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.reader-btn {
  padding:.4rem .9rem; border-radius:6px; font-size:.8rem; font-weight:500;
  cursor:pointer; transition:all .2s; border:1px solid rgba(255,255,255,.1);
  background:transparent; color:#94a3b8; text-decoration:none; display:inline-flex; align-items:center; gap:.4rem;
}
.reader-btn:hover { background:rgba(99,102,241,.2); color:#6366f1; border-color:#6366f1; }
.reader-frame { flex:1; width:100%; height:100%; border:none; background:#1e293b; }
</style>

<div class="reader-topbar">
  <a href="javascript:history.back()" class="reader-btn">
    <i data-lucide="arrow-left"></i> Back
  </a>
  <div class="reader-title">
    <span style="color:#94a3b8;"><i data-lucide="book-open-check"></i></span> {{ book.title }}
    <span style="color:#94a3b8;font-weight:400;font-size:.8rem;"> — {{ book.author }}</span>
  </div>
  {% if current_user.is_authenticated %}
    <form method="POST" action="{{ url_for('student.borrow_book', bid=book.id) }}" style="display:inline-block;">
      <button class="reader-btn" style="background:#6366f1;color:#fff;border-color:#6366f1;">
        <i data-lucide="heart-handshake"></i> Borrow Hardcopy
      </button>
    </form>
  {% endif %}
  <a href="{{ url_for('api.serve_ebook', filename=book.pdf_file) }}" target="_blank" class="reader-btn" title="Open in new tab">
    <i data-lucide="external-link"></i>
  </a>
</div>

<div style="display: flex; height: calc(100vh - 56px);">
  <iframe
    class="reader-frame"
    style="flex: 1; border-right: 1px solid rgba(255,255,255,.08);"
    src="{{ url_for('api.serve_ebook', filename=book.pdf_file) }}#toolbar=0&navpanes=0&scrollbar=1"
    allowfullscreen
    title="Reading {{ book.title }}"
  ></iframe>

  <div style="width: 350px; background: #0f172a; padding: 1.5rem; display: flex; flex-direction: column;">
    <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: #e2e8f0; display:flex; align-items:center; gap:8px;"><i data-lucide="edit-3"></i> My Notes</h3>
    <form method="POST" action="{{ url_for('student.save_annotation', bid=book.id) }}" style="display: flex; flex-direction: column; flex: 1; gap: 1rem;">
      <textarea name="content" style="flex: 1; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: #1e293b; color: #e2e8f0; padding: 1rem; resize: none; font-family: 'Inter', sans-serif;" placeholder="Jot down notes, important pages, or quotes here...">{% if annotation %}{{ annotation.content }}{% endif %}</textarea>
      <button type="submit" class="reader-btn" style="background: #6366f1; color: white; justify-content: center; padding: 12px; border: none; font-size: 1rem;">
        <i data-lucide="save"></i> Save Notes
      </button>
    </form>
  </div>
</div>

{% endblock %}
